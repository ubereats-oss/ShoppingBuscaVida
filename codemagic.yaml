workflows:
  ios_app_store:
    name: iOS — App Store
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.shopping.buscavida
      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID         # preencher no Codemagic dashboard
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER # preencher no Codemagic dashboard
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY       # preencher no Codemagic dashboard

    scripts:
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      - name: Get packages
        script: flutter pub get

      - name: Generate launcher icons
        script: flutter pub run flutter_launcher_icons

      - name: Install pods
        script: cd ios && pod install

      - name: Build iOS (App Store)
        script: |
          flutter build ios --release --no-codesign
          xcode-project use-profiles
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  ios_unsigned_sideloadly:
    name: iOS unsigned for Sideloadly
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Generate launcher icons
        script: flutter pub run flutter_launcher_icons

      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign

      - name: Create IPA
        script: |
          cd build/ios/iphoneos
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r app.ipa Payload

    artifacts:
      - build/ios/iphoneos/app.ipa